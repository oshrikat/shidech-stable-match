######################## SETUP application.properties ########################
spring.application.name=shidech-stable-match
## General setup
server.port = 8080
vaadin.launch-browser = true

## Terminal setup - text color, formating, disable logging... 
spring.output.ansi.enabled = always  
logging.pattern.console = %cyan(%d{HH:mm:ss}) [%green(%level)]  %cyan(%msg%n)
logging.level.root = ERROR

## Files Uploading setup
spring.servlet.multipart.enabled = true
spring.servlet.multipart.max-file-size = 16MB
spring.servlet.multipart.max-request-size = 16MB

## MongoDB setup connection
spring.data.mongodb.uri = ${MONGO_CONN_STRING}

## Email Connection :

# הגדרות שרת האימייל של Google
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=shidech.app@gmail.com

# CONN to Email Details
spring.mail.password=${EMAIL_CONN_CODE}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#############################################################################